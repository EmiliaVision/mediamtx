name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream tag to build (e.g. v1.16.3)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/emiliavision/mediamtx
  GCP_REGISTRY: us-east1-docker.pkg.dev
  GCP_IMAGE: us-east1-docker.pkg.dev/emilia-vision-core/emilia-vision/echobase-matrix/mediamtx

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target tag source
        if: ${{ github.event.inputs.tag != '' }}
        run: |
          # Save our custom files before switching
          cp -r docker/emilia /tmp/emilia-dockerfiles
          # Checkout the target tag source code
          git checkout ${{ github.event.inputs.tag }}
          # Restore our Dockerfiles
          mkdir -p docker/emilia
          cp -r /tmp/emilia-dockerfiles/* docker/emilia/

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate embedded assets
        run: go generate ./...

      - name: Cross-compile binaries
        run: |
          mkdir -p dist/linux/amd64 dist/linux/riscv64

          echo "=== Building linux/amd64 ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/linux/amd64/mediamtx .
          file dist/linux/amd64/mediamtx

          echo "=== Building linux/riscv64 ==="
          CGO_ENABLED=0 GOOS=linux GOARCH=riscv64 go build -o dist/linux/riscv64/mediamtx .
          file dist/linux/riscv64/mediamtx

          # Shared files in each arch dir (needed by Dockerfile COPY)
          for arch in amd64 riscv64; do
            cp mediamtx.yml dist/linux/$arch/
            cp LICENSE dist/linux/$arch/
          done

          ls -lhR dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/riscv64

      # --- Registry logins ---
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to GCP Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGISTRY }} --quiet

      # --- Build and push ---
      # Standard image (FROM scratch)
      - name: Build and push standard image
        uses: docker/build-push-action@v6
        with:
          context: dist
          file: docker/emilia/standard.Dockerfile
          platforms: linux/amd64,linux/riscv64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GCP_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.GCP_IMAGE }}:latest

      # FFmpeg image (FROM alpine + ffmpeg)
      - name: Build and push ffmpeg image
        uses: docker/build-push-action@v6
        with:
          context: dist
          file: docker/emilia/ffmpeg.Dockerfile
          platforms: linux/amd64,linux/riscv64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.tag }}-ffmpeg
            ${{ env.GHCR_IMAGE }}:latest-ffmpeg
            ${{ env.GCP_IMAGE }}:${{ steps.version.outputs.tag }}-ffmpeg
            ${{ env.GCP_IMAGE }}:latest-ffmpeg

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediamtx-binaries
          path: dist/
